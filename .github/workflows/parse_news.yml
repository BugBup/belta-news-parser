name: Парсинг новостей и создание дайджеста

on:
  schedule:
    - cron: "0 * * * *"   # каждый час в 00 минут
  workflow_dispatch:      # для ручного запуска

jobs:
  parse-and-digest:
    runs-on: ubuntu-latest
    
    # Важно: разрешаем доступ к GitHub Models
    permissions:
      contents: write     # чтобы сохранять файл в репозитории
      models: read        # чтобы использовать GitHub Models

    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установка зависимостей
        run: |
          pip install -r requirements.txt

      - name: Запуск скрипта парсинга
        run: python src/parser.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Автоматически доступен

      - name: Сохранение дайджеста в репозиторий
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Автоматическое обновление дайджеста новостей"
          file_pattern: digest.md
